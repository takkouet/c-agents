services:
  open-webui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: open-webui
    volumes:
      - open-webui-data:/app/backend/data
    ports:
      - "${OPEN_WEBUI_PORT:-3000}:8080"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_PROXY_PORT=4000
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY}
      # Proxy runs inside the same container, so localhost is correct here
      - OPENAI_API_BASE_URL=http://localhost:4000/v1
      - OPENAI_API_KEY=sk-1234
      - SCARF_NO_ANALYTICS=true
      - DO_NOT_TRACK=true
      - ANONYMIZED_TELEMETRY=false
    restart: unless-stopped
    # Override the default start.sh with the co-process variant
    command: ["bash", "start.prod.sh"]

volumes:
  open-webui-data: {}
